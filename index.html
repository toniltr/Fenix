<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fenix</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; overflow: hidden; }
      body { font-family: system-ui, sans-serif; background: #0e0e10; color: #eee; }
      canvas { display: block; }

      #hud {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        background: rgba(20,20,24,.7); padding: 10px 14px; border-radius: 10px;
        font-size: 13px; line-height: 1.7; pointer-events: none;
        border: 1px solid rgba(255,255,255,.08);
      }
      #hud b { font-weight: 600; color: #8ab4ff; }

      #dialogue {
        position: absolute; left: 50%; bottom: 28px; transform: translateX(-50%);
        width: min(680px, 92vw); z-index: 10; display: none;
        background: rgba(18,18,22,.92); border: 1px solid rgba(255,255,255,.1);
        border-radius: 14px; padding: 18px 20px;
      }
      #dialogue.show { display: block; }
      #dialogue .text { font-size: 16px; line-height: 1.6; margin-bottom: 14px; min-height: 24px; }
      #dialogue .choices { display: flex; flex-direction: column; gap: 8px; }
      #dialogue button {
        text-align: left; padding: 10px 14px; border-radius: 8px; cursor: pointer;
        background: rgba(255,255,255,.06); color: #eee; border: 1px solid rgba(255,255,255,.12);
        font-size: 15px; transition: background .15s;
      }
      #dialogue button:hover { background: rgba(138,180,255,.18); }

      #hint {
        position: absolute; bottom: 12px; right: 14px; z-index: 10;
        font-size: 12px; color: #888; pointer-events: none;
      }

      #loading-screen {
        position: fixed; inset: 0; z-index: 50;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 20px;
        background: rgba(10, 10, 14, 0.97);
        opacity: 0; pointer-events: none;
        transition: opacity 0.25s ease;
      }
      #loading-screen.visible {
        opacity: 1; pointer-events: auto;
        transition: none;
      }
      .loader-spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(255,255,255,.1);
        border-top-color: #8ab4ff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      .loader-text {
        font-size: 13px; color: #8ab4ff;
        letter-spacing: 0.12em; text-transform: uppercase;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="hud">
        Fenix · <b id="hud-room">—</b><br />
        Hora: <b id="hud-hora">—</b><br />
        Hambre: <b id="hud-hambre">—</b><br />
        Deuda: <b id="hud-deuda">—</b><br />
        Ánimo: <b id="hud-animo">—</b>
      </div>

      <div id="dialogue">
        <div class="text" id="dialogue-text"></div>
        <div class="choices" id="dialogue-choices"></div>
      </div>

      <div id="hint">Puerta ámbar: el tendero te deja pasar al salón si saldas la deuda · arrastra (botón derecho) para orbitar</div>

      <div id="loading-screen" aria-hidden="true">
        <div class="loader-spinner"></div>
        <div class="loader-text" id="loading-room-name">Viajando…</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
